name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Debug Workspace
      run: |
          pwd
          ls -R $GITHUB_WORKSPACE || ls -R /home/runner/work
          printenv

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install OpenCode CLI
      run: npm install -g opencode-ai

    - name: Install Dependencies
      run: npm ci

    - name: Run TypeScript Check
      run: npm run typecheck

    - name: Run Tests
      run: npm test

    - name: Build Project
      run: npm run build

    - name: Verify Package
      run: npm pack

  publish:
    name: Publish to npm
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        registry-url: 'https://registry.npmjs.org/'

    - name: Authenticate with npm
      run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

    - name: Install Dependencies
      run: npm ci

    - name: Build Project
      run: npm run build

    - name: Publish Package
      run: npm publish
